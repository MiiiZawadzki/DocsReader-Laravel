name: Deploy API

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-api
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: docsreader-laravel
  NAMESPACE: docsreader

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute lowercase image reference
        run: |
          OWNER_LC="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          echo "IMAGE=${REGISTRY}/${OWNER_LC}/${IMAGE_NAME}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          printf '%s' "${{ secrets.KUBECONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config
          kubectl version --client
          kubectl -n "$NAMESPACE" get deploy api reverb >/dev/null

      - name: Roll out API and Reverb
        run: |
          IMG="${{ env.IMAGE }}:${{ github.sha }}"
          echo "Deploying $IMG"
          kubectl -n "$NAMESPACE" set image deployment/api    api=$IMG
          kubectl -n "$NAMESPACE" set image deployment/reverb reverb=$IMG
          kubectl -n "$NAMESPACE" rollout status deployment/api    --timeout=300s
          kubectl -n "$NAMESPACE" rollout status deployment/reverb --timeout=300s

      - name: Diagnostics on failure
        if: failure()
        run: |
          kubectl -n "$NAMESPACE" get pods -o wide || true
          kubectl -n "$NAMESPACE" describe deployment/api    || true
          kubectl -n "$NAMESPACE" logs deployment/api    --tail=200 --all-containers || true
          kubectl -n "$NAMESPACE" describe deployment/reverb || true
          kubectl -n "$NAMESPACE" logs deployment/reverb --tail=200 --all-containers || true
